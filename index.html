<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Game Night</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="noise"></div>

  <main class="app">
    <section class="hero card-glow">
      <div class="top-pill">PRIVATE INVITE · 3 PLAYERS FOUND</div>
      <h1>GAME<br><span>NIGHT</span></h1>
      <p class="subtitle">Tap YES to unlock the mission.</p>

      <div class="photo-wrap" id="photoWrap">
        <img src="photo.jpg" alt="Uma, Lulu and Nina at Game Night" />
        <div class="photo-shine"></div>
      </div>

      <div class="players">
        <div class="player"><span>PLAYER 1</span><strong>Uma Podesta</strong><b>✓</b></div>
        <div class="player"><span>PLAYER 2</span><strong>Lulu Zivec</strong><b>✓</b></div>
        <div class="player"><span>PLAYER 3</span><strong>Nina Pliauzer</strong><b>✓</b></div>
      </div>

      <button class="primary" id="yesBtn">YES, I'M IN</button>
      <button class="sound" id="soundBtn" aria-label="Toggle music">♪ music on</button>
    </section>

    <section class="mission hidden" id="mission">
      <h2>MISSION UNLOCKED</h2>
      <p class="mini">Tap each card to reveal the details.</p>

      <div class="unlock-grid">
        <button class="flip-card" data-unlock>
          <span class="front">🂠</span>
          <span class="back"><small>DATE</small>Sábado 4 de julio</span>
        </button>
        <button class="flip-card" data-unlock>
          <span class="front">🂠</span>
          <span class="back"><small>TIME</small>20:30 hs</span>
        </button>
        <button class="flip-card" data-unlock>
          <span class="front">🂠</span>
          <span class="back"><small>LOCATION</small>11 de Septiembre 1888, 1590</span>
        </button>
      </div>

      <div class="dice-zone">
        <button id="dice" class="dice" aria-label="Roll the dice">🎲</button>
        <p id="diceMsg">Roll the dice for your game-night prophecy.</p>
      </div>

      <button class="primary final" id="acceptBtn">ACCEPT INVITATION</button>
      <div class="accepted hidden" id="accepted">MISSION ACCEPTED ✨<br><span>See you Saturday.</span></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
